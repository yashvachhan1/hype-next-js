<div class="wcs-trending-wrap-main">
    <div class="wcs-section-title-main">
        <h2>TRENDING PRODUCTS</h2>
    </div>

    <div id="wcs-trending-pro-block">
        <div class="wcs-grid-skeleton">
            <div class="wcs-skeleton-item"></div>
            <div class="wcs-skeleton-item"></div>
            <div class="wcs-skeleton-item"></div>
            <div class="wcs-skeleton-item"></div>
        </div>
    </div>
</div>

<style>
    /* Styling for the exact design matching screenshot */
    .wcs-trending-wrap-main {
        max-width: 1400px;
        margin: 50px auto;
        font-family: 'Inter', sans-serif;
        padding: 0 15px;
    }

    .wcs-section-title-main {
        text-align: center;
        margin-bottom: 40px;
    }

    .wcs-section-title-main h2 {
        font-size: 32px;
        font-weight: 700;
        color: #333;
        margin: 0;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .wcs-trending-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    .wcs-trending-card {
        background: #fff;
        border: 1px solid #f2f2f2;
        border-radius: 4px;
        /* Flatter radius matching screenshot */
        overflow: hidden;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        padding-bottom: 20px;
    }

    .wcs-trending-card:hover {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border-color: #eee;
    }

    .wcs-img-box {
        position: relative;
        padding-top: 100%;
        background: #fff;
        margin-bottom: 10px;
    }

    .wcs-img-box img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Product Pagination Dots Indicator */
    .wcs-pagi-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 20px;
    }

    .wcs-dot {
        width: 8px;
        height: 8px;
        background: #e0e0e0;
        border-radius: 50%;
    }

    .wcs-dot.u-active {
        background: #555;
    }

    .wcs-details {
        padding: 0 20px;
        text-align: left;
    }

    .wcs-p-brand {
        font-size: 13px;
        color: #777;
        margin: 0 0 10px 0;
        display: block;
        font-weight: 400;
    }

    .wcs-p-name {
        font-size: 15px;
        font-weight: 500;
        color: #333;
        margin: 0 0 12px 0;
        line-height: 1.5;
        height: 44px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .wcs-p-name a {
        color: inherit;
        text-decoration: none;
    }

    .wcs-login-to-price {
        font-size: 13px;
        color: #555;
        margin: 0;
        font-weight: 400;
    }

    .wcs-login-to-price a {
        color: #ff3333;
        /* Specific red for login */
        font-weight: 800;
        text-decoration: none;
    }

    .wcs-login-to-price a:hover {
        text-decoration: underline;
    }

    .wcs-real-price {
        font-size: 18px;
        font-weight: 700;
        color: #1a1a1a;
    }

    /* Skeleton Loading Effect */
    .wcs-grid-skeleton {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    .wcs-skeleton-item {
        height: 400px;
        background: #f7f7f7;
        border-radius: 4px;
        animation: wcs-blink 1.5s infinite;
    }

    @keyframes wcs-blink {
        0% {
            opacity: .5;
        }

        50% {
            opacity: 1;
        }

        100% {
            opacity: .5;
        }
    }

    @media (max-width: 1024px) {

        .wcs-trending-grid,
        .wcs-grid-skeleton {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 650px) {

        .wcs-trending-grid,
        .wcs-grid-skeleton {
            grid-template-columns: 1fr;
        }

        .wcs-section-title-main h2 {
            font-size: 26px;
        }
    }
</style>

<script>
    (function () {
        const CAT_SLUG = 'trending-products';
        const API_URL = `${window.location.origin}/wp-json/wc/store/v1/products?category=${CAT_SLUG}&per_page=4`;

        async function loadWcsProducts() {
            const wrapper = document.getElementById('wcs-trending-pro-block');
            try {
                const resp = await fetch(API_URL);
                const products = await resp.json();

                if (!products || products.length === 0) {
                    wrapper.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">No trending products found.</div>';
                    return;
                }

                let html = '<div class="wcs-trending-grid">';
                products.forEach(p => {
                    const img = p.images[0] ? p.images[0].src : 'https://via.placeholder.com/400';
                    const price = p.price_html || `<p class="wcs-login-to-price">Please <a href="/my-account/">log in</a> to view price.</p>`;

                    // Extract Brand - usually first category if not using dedicated brand plugin
                    const brand = (p.categories && p.categories.length > 0) ? p.categories[0].name : '';

                    html += `
                    <div class="wcs-trending-card">
                        <div class="wcs-img-box">
                            <a href="${p.permalink}"><img src="${img}"></a>
                        </div>
                        
                        <div class="wcs-pagi-dots">
                            <div class="wcs-dot u-active"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                            <div class="wcs-dot"></div>
                        </div>

                        <div class="wcs-details">
                            <span class="wcs-p-brand">${brand}</span>
                            <h3 class="wcs-p-name"><a href="${p.permalink}">${p.name}</a></h3>
                            <div class="wcs-p-price-row">${price}</div>
                        </div>
                    </div>
                `;
                });
                html += '</div>';
                wrapper.innerHTML = html;
            } catch (e) {
                console.error('WCS Error', e);
                wrapper.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">Unable to load products.</div>';
            }
        }
        loadWcsProducts();
    })();
</script>
